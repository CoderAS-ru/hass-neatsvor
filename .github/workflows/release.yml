name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update manifest.json (only version)
        run: |
          python3 << EOF
          import json
          
          version = "${{ steps.version.outputs.VERSION }}"
          
          with open("custom_components/neatsvor/manifest.json", "r") as f:
              manifest = json.load(f)
          
          manifest["version"] = version
          
          with open("custom_components/neatsvor/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          
          print(f"Updated manifest.json: version={version}")
          EOF

      - name: Update __version__.py (with date)
        run: |
          cat > custom_components/neatsvor/__version__.py << EOF
          \"\"\"Version information for Neatsvor integration.\"\"\"
          
          __version__ = "${{ steps.version.outputs.VERSION }}"
          __release_date__ = "$(date -u +%Y-%m-%d)"
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/neatsvor/manifest.json
          git add custom_components/neatsvor/__version__.py
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Create ZIP
        run: |
          cd custom_components/neatsvor
          zip -r ../neatsvor.zip ./
          cd ../..

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: custom_components/neatsvor.zip
          asset_name: neatsvor.zip
          tag: ${{ github.ref }}
          overwrite: true
