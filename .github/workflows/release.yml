name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create ZIP
      run: |
        zip -r "neatsvor-${{ steps.get_version.outputs.VERSION }}.zip" \
          custom_components/ \
          translations/ \
          LICENSE \
          README.md \
          hacs.json \
          -x "*.pyc" "*__pycache__*" "*.git*"
    
    - name: Upload to Release
      run: |
        gh release upload ${{ github.ref_name }} \
          "neatsvor-${{ steps.get_version.outputs.VERSION }}.zip" \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
