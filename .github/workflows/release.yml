name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create ZIP
      run: |
        mkdir -p neatsvor
        cp -r custom_components neatsvor/
        cp -r translations neatsvor/ 2>/dev/null || true
        cp LICENSE README.md hacs.json neatsvor/ 2>/dev/null || true
        cd neatsvor
        find . -name "*.pyc" -delete
        find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
        zip -r "../neatsvor-${{ steps.get_version.outputs.VERSION }}.zip" .
        cd ..
        rm -rf neatsvor
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.uploader_url }}
        asset_path: ./neatsvor-${{ steps.get_version.outputs.VERSION }}.zip
        asset_name: neatsvor-${{ steps.get_version.outputs.VERSION }}.zip
        asset_content_type: application/zip
