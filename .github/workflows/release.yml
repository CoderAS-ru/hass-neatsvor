name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update files for ZIP (no commit)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)
          
          # Обновляем manifest.json
          python3 << EOF
          import json
          with open("custom_components/neatsvor/manifest.json", "r") as f:
              manifest = json.load(f)
          manifest["version"] = "$VERSION"
          with open("custom_components/neatsvor/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          EOF
          
          # Обновляем __version__.py
          cat > custom_components/neatsvor/__version__.py << EOF
          \"\"\"Version information for Neatsvor integration.\"\"\"
          
          __version__ = "$VERSION"
          __release_date__ = "$DATE"
          EOF
          
          echo "✅ Updated files to version $VERSION (in workspace only)"

      - name: Create ZIP
        run: |
          cd custom_components/neatsvor
          zip -r ../neatsvor.zip ./
          cd ../..
          echo "✅ Created neatsvor.zip"

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: custom_components/neatsvor.zip
          asset_name: neatsvor.zip
          tag: ${{ github.ref }}
          overwrite: true
