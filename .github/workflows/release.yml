name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create ZIP
        run: |
          cd custom_components
          zip -r ../neatsvor.zip neatsvor/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: neatsvor.zip
          generate_release_notes: true
