type: custom:xiaomi-vacuum-map-card
entity: vacuum.s700_smart_vacuum
preset_name: 🗺️ Живая карта
map_source:
  camera: camera.s700_live_map
calibration_source:
  identity: true
refresh_interval: 1
title: Neatsvor S700
zones:
  color: rgba(255, 255, 255, 0.3)
  border_color: rgba(255, 255, 255, 0.8)
  stroke_width: 2
  enable_drag: true
  enable_rotate: true
  enable_remove_last_point: true
  service: xiaomi_miio.vacuum_clean_zone
  service_data:
    entity_id: vacuum.s700_smart_vacuum
    zones: "[[x1, y1, x2, y2, 1]]"
icons:
  - icon: mdi:play
    tooltip: Запуск
    tap_action:
      action: call-service
      service: vacuum.start
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - icon: mdi:pause
    tooltip: Пауза
    tap_action:
      action: call-service
      service: vacuum.pause
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - icon: mdi:stop
    tooltip: Стоп
    tap_action:
      action: call-service
      service: vacuum.stop
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - type: menu
    menu_id: fan_speed
    tooltip: Мощность вентилятора
    icon: mdi:fan
    entity: select.s700_fan_speed
    available_values_attribute: options
    icon_mapping:
      quiet: mdi:fan-speed-1
      Тихий: mdi:fan-speed-1
      normal: mdi:fan-speed-2
      Обычный: mdi:fan-speed-2
      strong: mdi:fan-speed-3
      Сильный: mdi:fan-speed-3
      max: mdi:fan-plus
      Максимальный: mdi:fan-plus
    tap_action:
      action: call-service
      service: select.select_option
      service_data:
        entity_id: select.s700_fan_speed
        option: "[[value]]"
  - type: menu
    menu_id: water_box_mode
    tooltip: Подача воды
    icon: mdi:water
    entity: select.s700_water_level
    available_values_attribute: options
    icon_mapping:
      low: mdi:water-minus
      Низкий: mdi:water-minus
      middle: mdi:water
      Средний: mdi:water
      high: mdi:water-plus
      Высокий: mdi:water-plus
    tap_action:
      action: call-service
      service: select.select_option
      service_data:
        entity_id: select.s700_water_level
        option: "[[value]]"
  - type: menu
    menu_id: clean_mode
    tooltip: Режим уборки
    icon: mdi:vacuum
    entity: select.s700_clean_mode
    available_values_attribute: options
    icon_mapping:
      sweep: mdi:broom
      Только подмести: mdi:broom
      mop: mdi:spray
      Только мыть: mdi:spray
      sweepMop: mdi:vacuum-outline
      Подмести и вымыть: mdi:vacuum-outline
    tap_action:
      action: call-service
      service: select.select_option
      service_data:
        entity_id: select.s700_clean_mode
        option: "[[value]]"
  - icon: mdi:home-import-outline
    tooltip: На базу
    tap_action:
      action: call-service
      service: vacuum.return_to_base
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - icon: mdi:map-marker-radius
    tooltip: Поиск
    tap_action:
      action: call-service
      service: vacuum.locate
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - icon: mdi:map-search
    tooltip: Построить карту
    tap_action:
      action: call-service
      service: neatsvor.build_map
      service_data:
        entity_id: vacuum.s700_smart_vacuum
  - icon: mdi:delete
    tooltip: Очистить контейнер
    tap_action:
      action: call-service
      service: neatsvor.empty_dust
      service_data:
        entity_id: vacuum.s700_smart_vacuum
tiles:
  - entity: sensor.s700_battery
    name: Battery
    unit: "%"
    icon: mdi:battery
  - entity: sensor.s700_current_clean_time
    name: Clean Time
    unit: min
  - entity: sensor.s700_current_clean_area
    name: Clean Area
    unit: m²
  - entity: sensor.s700_status
    name: Status
additional_presets:
  - preset_name: 🧹 Уборка комнат
    entity: vacuum.s700_smart_vacuum
    map_source:
      camera: camera.s700_live_map
    calibration_source:
      identity: true
    icons:
      - icon: mdi:refresh
        tooltip: Обновить список комнат
        label: Обновить список комнат
        tap_action:
          action: call-service
          service: homeassistant.update_entity
          service_data:
            entity_id:
              - select.s700_room_select
              - sensor.s700
      - icon: mdi:home-circle-outline
        label: Все комнаты
        tooltip: Все комнаты
        tap_action:
          action: call-service
          service: vacuum.start
          service_data:
            entity_id: vacuum.s700_smart_vacuum
      - type: menu
        menu_id: rooms
        tooltip: Выбор комнаты
        icon: mdi:floor-plan
        entity: select.s700_room_select
        available_values_attribute: options
        icon_mapping:
          Коридор: mdi:wardrobe
          Hallway: mdi:wardrobe
          Гостиная: mdi:sofa
          Living room: mdi:sofa
          Детская: mdi:bed
          Childish: mdi:bed
          Кухня: mdi:fridge
          Kitchen: mdi:fridge
          Спальня: mdi:bed
          Bedroom: mdi:bed
          Ванная: mdi:shower
          Bathroom: mdi:shower
          Туалет: mdi:toilet
          Toilet: mdi:toilet
          Кабинет: mdi:desk
          Office: mdi:desk
        tap_action:
          action: call-service
          service: neatsvor.clean_room_with_preset
          service_data:
            entity_id: vacuum.s700_smart_vacuum
            room: "[[value]]"
            use_preset: true
    tiles:
      - entity: sensor.s700
        name: Map Status
        icon: mdi:map
        template: >
          {% set rooms = state_attr('select.s700_room_select', 'options') %} {%
          if rooms %}
            🗺️ {{ rooms | length }} rooms
          {% else %}
            No map data
          {% endif %}
      - entity: select.s700_room_select
        name: Selected Room
        icon: mdi:floor-plan
  - preset_name: ☁️ Карты в облаке
    entity: vacuum.s700_smart_vacuum
    map_source:
      camera: camera.s700_cloud_map
    calibration_source:
      identity: true
    icons:
      - icon: mdi:refresh
        label: Refresh Maps
        tooltip: Refresh Maps
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.s700_refresh_cloud_maps
      - type: menu
        menu_id: cloud_maps
        tooltip: Select cloud map
        icon: mdi:map-search
        entity: select.s700_cloud_map_select
        available_values_attribute: options
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.s700_cloud_map_select
            option: "[[value]]"
      - icon: mdi:star-circle
        label: Set as Reference
        tooltip: Set selected map as reference
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.s700_set_reference_map
          confirmation:
            text: Set this map as reference for auto-restore?
      - icon: mdi:map-check
        label: Use Map
        tooltip: Use selected cloud map as current map
        tap_action:
          action: call-service
          service: neatsvor.use_selected_cloud_map
          service_data:
            entity_id: vacuum.s700_smart_vacuum
          confirmation:
            text: Make selected map the current map?
      - type: toggle
        menu_id: auto_restore
        tooltip: Auto-restore reference map
        icon: mdi:autorenew
        entity: switch.s700_auto_restore_reference_map
        tap_action:
          action: call-service
          service: switch.toggle
          service_data:
            entity_id: switch.s700_auto_restore_reference_map
    tiles:
      - entity: sensor.s700_cloud_maps
        name: Total Maps
        icon: mdi:cloud
        show_name: true
        template: |
          {{ states('sensor.s700_cloud_maps') }} maps total
      - entity: select.s700_cloud_map_select
        name: Map select
        icon: mdi:map-check
        show_name: true
      - entity: switch.s700_auto_restore_reference_map
        name: Auto-restore
        icon: mdi:autorenew
        show_name: true
      - entity: sensor.s700_cloud_maps
        name: Reference Map
        icon: mdi:star-circle
        show_name: true
        template: >
          {% set attrs = state_attr('sensor.s700_cloud_maps', 'reference') %} {%
          if attrs %}
            {% set map = state_attr('sensor.s700_cloud_maps', 'maps') | selectattr('id', 'equalto', attrs) | list %}
            {% if map %}
              {{ map[0].name }}
            {% else %}
              ID: {{ attrs }}
            {% endif %}
          {% else %}
            None set
          {% endif %}
  - preset_name: 📥 История уборок
    entity: vacuum.s700_smart_vacuum
    map_source:
      camera: camera.s700_clean_history_map
    calibration_source:
      identity: true
    icons:
      - icon: mdi:refresh
        label: Refresh History
        tooltip: Обновить историю
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.s700_refresh_clean_history
      - type: menu
        menu_id: clean_history
        tooltip: Выбор записи истории
        icon: mdi:history
        entity: select.s700_clean_history_select
        available_values_attribute: options
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.s700_clean_history_select
            option: "[[value]]"
    tiles:
      - entity: select.s700_clean_history_select
        name: History Record
        icon: mdi:history
        show_name: true
      - entity: sensor.s700_last_clean
        name: Last Clean
      - entity: sensor.s700_last_clean_duration
        name: Duration
        unit: min
      - entity: sensor.s700_last_clean_area
        name: Area
        unit: m²
      - entity: sensor.s700_total_cleanings
        name: Total Cleanings
      - entity: sensor.s700_total_clean_time
        name: Total Time
        unit: h
      - entity: sensor.s700_total_clean_area
        name: Total Area
        unit: m²
  - preset_name: ℹ️ Информация
    entity: vacuum.s700_smart_vacuum
    map_source:
      camera: camera.s700_live_map
    calibration_source:
      identity: true
    icons: []
    tiles:
      - entity: sensor.s700_hepa_filter
        name: HEPA Filter
        unit: "%"
      - entity: sensor.s700_main_brush
        name: Main Brush
        unit: "%"
        icon: mdi:brush-variant
      - entity: sensor.s700_side_brush
        name: Side Brush
        unit: "%"
      - entity: binary_sensor.s700_online
        name: Online
        icon: mdi:satellite-uplink
      - entity: binary_sensor.s700_charging
        name: Charging
      - entity: binary_sensor.s700_dust_bin
        name: Dust Bin
      - entity: binary_sensor.s700_mop_attached
        name: Mop Attached
      - entity: sensor.s700_software_version
        name: Software Version
      - entity: sensor.s700_mac_address
        name: MAC Address
      - entity: sensor.s700_device_pid
        name: Device PID
grid_options:
  columns: full
