// liboshome/protobuf/sweeper_any.proto
syntax = "proto3";

package sweeper;

import "sdk_com.proto"; // Путь может потребовать корректировки

message UseMap {
    int32 map_id = 1;
    string url = 2;
    string md5 = 3;
}

message VoicePacketRspInfo {
    int32 cur_audio_id = 1;
    int32 cur_audio_version = 2;
    int32 downloading_id = 3;
    DownloadingState downloading_state = 4;
    int32 downloading_percent = 5;

    enum DownloadingState {
        kInvalid = 0;
        kDownloading = 1;
        kDownloadFailed = 2;
        kInstallSuccess = 3;
        kInstallFailed = 4;
    }
}

message DeviceInfo {
    string token = 1;
    string login_name = 2;
    string hardware_version = 3;
    string firmware_version = 4;
    string production_date = 5;
    string country_code = 6;
    int32 time_zone = 7;
    bvsdk.WifiInfo wifi_info = 8;
    string base_station_hardware_version = 9;
    string base_station_firmware_version = 10;
}

message SplitRoom {
    int32 room_id = 1;
    bvsdk.Line line = 2;
}

message ManualV2 {
    int32 angle = 1;
    int32 velocity = 2;
}

message VoicePacketCmdInfo {
    int32 audio_id = 1;
    string audio_name = 2;
    string url = 3;
    string md5_value = 4;
    int32 audio_version = 5;
}

message CustomVoice {
    CustomVoiceCtrlType control_type = 1;
    string code = 2;
    string url = 3;
    string md5_value = 4;
}

// ВАЖНО: Вот отсутствующее сообщение Rooms!
message Rooms {
    repeated int32 room_ids = 1;
    int32 fan_level = 2;
    int32 water_level = 3;
    int32 mode = 4;
}

message BaseStation {
    TankStatus solution_tank = 1;
    TankStatus sewage_tank = 2;
    DustBinError dust_bin_error = 3;
    BaseStationWorkState station_state = 4;
    PalletStatus pallet_error = 5;

    enum TankStatus {
        kInstall = 0;
        kUnInstall = 1;
        kTankFull = 2;
        kTankLack = 3;
    }

    enum DustBinError {
        kDustBinNoError = 0;
        kDustBinFull = 1;
        kDustBinOpen = 2;
        kDustUninstall = 3;
    }

    enum BaseStationWorkState {
        kStationIdle = 0;
        kDustCollecting = 1;
        kWashingMop = 2;
        kDryingMop = 3;
    }

    enum PalletStatus {
        kPalletNormal = 0;
        kPalletWaterFull = 1;
        kPalletUninstall = 2;
    }
}

enum CustomVoiceCtrlType {
    SET = 0;
    RESET = 1;
    PLAY = 2;
}