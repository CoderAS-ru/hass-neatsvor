syntax = "proto3";

package sweeper;

import "sweeper_com.proto";
import "sdk_com.proto";

message MqttMsgMap {
    bvsdk.MqttMsgHeader header = 1;
    MapData body = 2;
}

message MapData {
    int32 frame_id = 1;
    int32 width = 2;
    int32 height = 3;
    int32 resolution = 4;
    MapInfo map_info = 5;
    TraceInfo trace_info = 6;
    PlanningInfo planning_info = 7;
    RoomInfo room_info = 8;
    ForbiddenInfo forbidden_info = 9;
    repeated bvsdk.Point contour = 10;
    int32 map_process_type = 11;
}

message MapInfo {
    bvsdk.Point origin = 1;
    repeated int32 data = 2;
    bool can_edit = 3;
    int32 map_area = 4;
    bvsdk.Point charger_position = 5;
    repeated ObjectPosition object_positions = 6;

    message ObjectPosition {
        int32 type = 1;
        bvsdk.Point points = 2;
    }
}

message TraceInfo {
    TraceInfoType type = 1;
    bvsdk.Point3D robot_position = 2;
    int32 count = 3;
    repeated TraceData data = 4;

    message TraceData {
        TraceDataType type = 1;
        repeated bvsdk.Point points = 2;

        enum TraceDataType {
            kNormalPoint = 0;
            kDirectPoint = 1;
            kChargePoint = 2;
        }
    }

    enum TraceInfoType {
        kTraceComplete = 0;
        kTraceIncrement = 1;
    }
}

message PlanningInfo {
    repeated bvsdk.Point navigation_path = 1;
    ZoneClean planning_zones = 2;
    repeated int32 select_rooms = 3;
}

message RoomInfo {
    repeated RoomName room_names = 1;
    repeated RoomAttr room_attrs = 2;
}

message ForbiddenInfo {
    repeated bvsdk.Line virtual_walls = 1;
    repeated bvsdk.Polygon forbidden_zones = 2;
    repeated bvsdk.Polygon mop_forbidden_zones = 3;
}