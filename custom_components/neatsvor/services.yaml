find_robot:
  name: Find Robot
  description: Make the robot emit a sound to locate it
  target:
    entity:
      domain: vacuum

build_map:
  name: Build Map
  description: Perform a fast map build without cleaning
  target:
    entity:
      domain: vacuum

empty_dust:
  name: Empty Dust Bin
  description: Force the dust bin to be emptied
  target:
    entity:
      domain: vacuum

set_volume:
  name: Set Volume
  description: Adjust the volume of voice messages
  target:
    entity:
      domain: vacuum
  fields:
    volume:
      name: Volume
      description: Volume level (0-100)
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

request_all_data:
  name: Request All Data
  description: Request all data like the official app does
  target:
    entity:
      domain: vacuum

request_map:
  name: Request Map
  description: Request the current map
  target:
    entity:
      domain: vacuum

clean_room_with_preset:
  name: Clean Room With Preset
  description: Clean a room using saved preset settings from the map
  target:
    entity:
      domain: vacuum
  fields:
    room:
      name: Room Name
      description: Name of the room to clean
      required: true
      example: "Living Room"
      selector:
        text:
    use_preset:
      name: Use Preset
      description: Use saved preset settings (fan speed, water level from map)
      required: false
      default: true
      selector:
        boolean:

clean_multiple_rooms_with_presets:
  name: Clean Multiple Rooms With Presets
  description: Clean multiple rooms using their saved presets
  target:
    entity:
      domain: vacuum
  fields:
    rooms:
      name: Room Names
      description: List of room names to clean
      required: true
      example: '["Living Room", "Kitchen"]'
      selector:
        object:

restore_reference_map:
  name: Restore Reference Map
  description: Restore room configuration from reference map
  target:
    entity:
      domain: vacuum
  fields:
    room_names:
      name: Room Names
      description: Restore room names from reference (true/false)
      required: false
      default: true
      selector:
        boolean:
    room_presets:
      name: Room Presets
      description: Restore room presets from reference (true/false)
      required: false
      default: true
      selector:
        boolean:

compare_with_reference:
  name: Compare With Reference
  description: Compare current map with reference map
  target:
    entity:
      domain: vacuum
  fields:
    show_details:
      name: Show Details
      description: Show detailed comparison
      required: false
      default: false
      selector:
        boolean:

cleanup_maps:
  name: Clean Up Maps
  description: Remove old realtime maps and their metadata
  target:
    entity:
      domain: vacuum
  fields:
    keep_last:
      name: Keep Last
      description: Number of most recent maps to keep
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider

load_reference_map:
  name: Load Reference Map
  description: Load the reference map to the robot
  target:
    entity:
      domain: vacuum
  fields:
    map_id:
      name: Map ID
      description: ID of the map to load (optional, uses reference if not specified)
      required: false
      selector:
        number:
          min: 0
          max: 1000
          step: 1

force_load_history:
  name: Force Load History
  description: Force load all clean history maps and generate PNGs
  target:
    entity:
      domain: vacuum

zone_clean:
  name: Zone Clean
  description: Clean a specific zone on the map
  target:
    entity:
      domain: vacuum
  fields:
    x1:
      name: X1 Coordinate
      description: Left coordinate
      required: true
      selector:
        number:
          min: 0
          max: 1000
          step: 1
    y1:
      name: Y1 Coordinate
      description: Top coordinate
      required: true
      selector:
        number:
          min: 0
          max: 1000
          step: 1
    x2:
      name: X2 Coordinate
      description: Right coordinate
      required: true
      selector:
        number:
          min: 0
          max: 1000
          step: 1
    y2:
      name: Y2 Coordinate
      description: Bottom coordinate
      required: true
      selector:
        number:
          min: 0
          max: 1000
          step: 1
    repeats:
      name: Repeats
      description: Number of cleaning passes
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1

vacuum_clean_zone:
  name: Clean Zone (Xiaomi Miio Compatible)
  description: Start zone cleaning (compatible with xiaomi-vacuum-map-card)
  fields:
    entity_id:
      name: Vacuum Entity
      description: Vacuum entity to control
      required: true
      example: "vacuum.neatsvor_vacuum"
      selector:
        entity:
          domain: vacuum
    zones:
      name: Zones
      description: List of zones to clean, each zone = [x1, y1, x2, y2, repeats]
      required: true
      example: "[[100, 100, 500, 500, 1]]"
      selector:
        object: {}